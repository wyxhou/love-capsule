<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Capsule 💌</title>

  <!-- favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <!-- romantic fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="hearts"></div>
  <div class="glow"></div>

  <!-- HERO -->
  <section class="hero">
    <h1 id="typeText"></h1>
    <button id="openBtn" class="primary-btn">Open the capsule 💗</button>
  </section>

  <!-- REASONS -->
  <section class="reasons" id="reasons">
    <h2 class="section-title">Reasons I Love You 💌</h2>

    <div class="envelope-grid">

      <div class="envelope">
        <span>tap to open</span>
        <p class="hidden">You make my inner child express herself ✨</p>
      </div>

      <div class="envelope">
        <span>tap to open</span>
        <p class="hidden">You're really charming and funny 😌</p>
      </div>

      <div class="envelope">
        <span>tap to open</span>
        <p class="hidden">Authentic as can get 💗</p>
      </div>

    </div>
  </section>

  <!-- FINAL -->
  <section class="final">
    <h2 class="final-text">Will you be my Valentine? 💖</h2>

    <div class="buttons">
      <button class="yes primary-btn">YES 💗</button>
      <button class="no" id="noBtn">NO 🙈</button>
    </div>

    <p id="loveMessage" class="love-message">
      You just made my whole year 🥺💗
    </p>
  </section>

<script src="script.js"></script>
</body>
</html>
