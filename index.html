<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Capsule 💌</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- floating hearts -->
  <div class="hearts"></div>

  <!-- HERO -->
  <section class="hero">
    <h1 id="typeText"></h1>
    <button onclick="scrollToSection()">Open the capsule 💗</button>
  </section>

  <!-- REASONS -->
  <section class="reasons" id="reasons">
    <h2>Reasons I Love You 💌</h2>
    <div class="envelope-grid">

      <div class="envelope" onclick="reveal(this)">
        <span>Click me</span>
        <p class="hidden">The way you make ordinary days special ✨</p>
      </div>

      <div class="envelope" onclick="reveal(this)">
        <span>Click me</span>
        <p class="hidden">Your late night random thoughts 🌙</p>
      </div>

      <div class="envelope" onclick="reveal(this)">
        <span>Click me</span>
        <p class="hidden">How safe I feel with you 💗</p>
      </div>

    </div>
  </section>

  <!-- GALLERY -->
  <section class="gallery">
    <h2>Our Memories 🖼️</h2>
    <div class="photos">
      <img src="https://picsum.photos/200?1" />
      <img src="https://picsum.photos/200?2" />
      <img src="https://picsum.photos/200?3" />
    </div>
  </section>

  <!-- FINAL -->
  <section class="final">
    <h2>Will you be my Valentine? 💖</h2>
    <div class="buttons">
      <button class="yes">YES 💗</button>
      <button class="no" id="noBtn">NO 🙈</button>
    </div>
  </section>

<script src="script.js"></script>
</body>
</html>
